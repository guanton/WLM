# env.yaml — minimal conda/mamba environment for WLM
#
# Install:
#   mamba env create -f env.yaml
#   mamba activate WLM
#
# Or with conda:
#   conda env create -f env.yaml
#   conda activate WLM
#
# Tested with Python 3.11 + CUDA 12.1 on Linux. Pin versions if you need
# bit-exact reproducibility (see env_full.yaml for an exhaustive snapshot).

name: WLM
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - pip

  # --- PyTorch (CUDA 12.1; swap pytorch-cuda for cpuonly if you don't have a GPU)
  - pytorch=2.4.*
  - torchvision
  - pytorch-cuda=12.1

  - numpy<2.0
  - scipy
  - scikit-learn
  - matplotlib
  - imageio

  # --- Optimal transport
  - pot

  # --- Config / CLI
  - pyyaml

  # --- Experiment tracking
  - wandb

  # --- pip-only deps
  - pip:
      - geomloss        # debiased Sinkhorn loss

      # --- Optional: only needed for the EB single-cell dataset
      # - scprep
      # - phate

      # --- Optional: only needed for inline notebook display
      # - ipython
