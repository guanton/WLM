# configs/data/gf_sde.yaml
#
# Base config for gradient-flow SDE data generation.
# Toggles: --set mode=potential_sde --set pot=<name> --set kill_condition=<bool>
#
# Five potentials supported: bohachevsky, poly (quadratic), styblinski_tang,
# oakley_ohagan, wavy_plateau (whichever your dataset_modules/gf_sde.py exposes).
#
# Note: --set mode=potential_sde MUST be provided (or set here) — the run script
# inspects this to dispatch to the right subparser.

mode: potential_sde

# --- Required toggles (overridden per row in the runlist) ---
pot: poly                     # one of: bohachevsky, poly, styblinski_tang, oakley_ohagan, wavy_plateau
kill_condition: false         # true → cross-sectional snapshots, false → standard trajectories

# --- Standard SDE knobs (kept consistent across the gf_sde sweep) ---
N: 1000
steps: 20
dt: 0.01
d: 2
num_p0: 1
sigma: 1.0

# --- Initial distribution ---
p0: gaussian
p0_mean: [0.0, 0.0]
p0_var: 0.2

# --- Blur estimation for downstream WLM training ---
blur_scale: 0.5
blur_min: 1.0e-3
blur_max: 10.0
blur_num_times: 8
blur_pairs_per_time: 4096
blur_particles_subsample: 1000
